name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check release assets
        run: |
          test -f transTags_windows/release/transTags_windows.exe
          test -f transTags_windows/release/transTags_windows.zip
          test -f transTags_linux/release/transTags_linux.zip

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          title="transTags ${tag}"
          notes="$(cat <<'EOF'
## Downloads

- Windows executable: `transTags_windows.exe`
- Windows package: `transTags_windows.zip`
- Ubuntu/Linux package: `transTags_linux.zip`

## Notes

- Windows can run `transTags_windows.exe` directly.
- Ubuntu/Linux should use the Qt version in an `Ubuntu on Xorg` session.
- See `README.md` or `README_CN.md` for usage and implementation notes.
EOF
)"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" \
              transTags_windows/release/transTags_windows.exe \
              transTags_windows/release/transTags_windows.zip \
              transTags_linux/release/transTags_linux.zip \
              --clobber
          else
            gh release create "$tag" \
              transTags_windows/release/transTags_windows.exe \
              transTags_windows/release/transTags_windows.zip \
              transTags_linux/release/transTags_linux.zip \
              --title "$title" \
              --notes "$notes" \
              --latest
          fi
