name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    name: Upload release assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: transTags ${{ github.ref_name }}
          make_latest: true
          body: |
            ## Downloads

            - Windows executable: `transTags_windows.exe`
            - Windows package: `transTags_windows.zip`
            - Ubuntu/Linux package: `transTags_linux.zip`

            ## Demo

            ![transTags demo](https://raw.githubusercontent.com/Rerke7781/transTags/${{ github.ref_name }}/docs/assets/transTags_demo.png)

            ## Notes

            - Windows users can run `transTags_windows.exe` directly.
            - Ubuntu/Linux users should build and run the Qt version in an `Ubuntu on Xorg` session.
            - Sticky notes are available on both Windows and Ubuntu/Linux. Use `Alt+N` or the tray menu to create notes.
            - See `README.md` or `README_CN.md` for usage and implementation notes.
          files: |
            transTags_windows/release/transTags_windows.exe
            transTags_windows/release/transTags_windows.zip
            transTags_linux/release/transTags_linux.zip
